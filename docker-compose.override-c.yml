services:
  mongodb:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  postgres:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  pdf-service:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  backend:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G

  frontend:
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  nginx:
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
