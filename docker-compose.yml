services:
  mongodb:
    image: mongo:8.0.15
    container_name: pdf-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-password123}
      MONGO_INITDB_DATABASE: pdf_templates
    volumes:
      - mongodb_data:/data/db
      - ./EditorReportesBack/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks: [pdf-network]

  postgres:
    image: postgres:16
    container_name: pdf-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: pdf_auth
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-password123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./EditorReportesBack/scripts/postgres-init.sql:/docker-entrypoint-initdb.d/postgres-init.sql:ro
    networks: [pdf-network]

  redis:
    image: redis:7.2-alpine
    container_name: pdf-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [pdf-network]

  pdf-service:
    build: ./pdf-service
    container_name: pdf-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    networks: [pdf-network]

  backend:
    build:
      context: ./EditorReportesBack
      dockerfile: Dockerfile
    init: true
    container_name: pdf-backend
    restart: unless-stopped
    ports: ["${API_PORT:-4000}:${API_PORT:-4000}"]
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-4000}
      API_URL: http://localhost:${API_PORT:-4000}
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-password123}@mongodb:27017/pdf_templates?authSource=admin&directConnection=true
      POSTGRES_URI: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASS:-password123}@postgres:5432/pdf_auth
      BASE_URL: http://localhost:${API_PORT:-4000}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      PDF_SERVICE_URL: http://pdf-service:3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALTCHA_HMAC_KEY: ${ALTCHA_HMAC_KEY}
      PROJECT_MODE: ${PROJECT_MODE:-saas}
      USE_BREVO: ${USE_BREVO:-true}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_MAIL: ${BREVO_SENDER_MAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD:-contrasena123}
      ENABLE_RATE_LIMIT: ${ENABLE_RATE_LIMIT:-true}
      PDF_LIMIT_PER_HOUR: ${PDF_LIMIT_PER_HOUR:-100}
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY:-3}
      QUEUE_DURATION: ${QUEUE_DURATION:-310000}
      QUEUE_DELAY: ${QUEUE_DELAY:-500}
      QUEUE_ATTEMPTS: ${QUEUE_ATTEMPTS:-3}
      QUEUE_LOCK_RENEW_TIME: ${QUEUE_LOCK_RENEW_TIME:-15000}
      MAX_RECOVERY_ATTEMPTS_24H: ${MAX_RECOVERY_ATTEMPTS_24H:-3}
      CLEANUP_CRON_SCHEDULE: ${CLEANUP_CRON_SCHEDULE:-*/1 * * * *}
      INLINE_IMAGES_IGNORE_SSL: ${INLINE_IMAGES_IGNORE_SSL:-true}
      WEBHOOK_ALLOW_SELFSIGNED: ${WEBHOOK_ALLOW_SELFSIGNED:-true}
      CORS_ORIGIN: ${CORS_ORIGIN}
    volumes:
      - uploads:/app/uploads
    # secrets:
    #   - gcp-key
    depends_on:
      mongodb: { condition: service_started }
      postgres: { condition: service_started }
      redis: { condition: service_started }
      pdf-service: { condition: service_started }
    networks: [pdf-network]

  frontend:
    build:
      context: ./EditorReportes
      args:
        VITE_API_BACK_URL: ${VITE_API_BACK_URL:-}
        VITE_GRAPHQL_URL: ${VITE_GRAPHQL_URL:-/graphql}
        VITE_API_PDF_URL: ${VITE_API_PDF_URL:-/api/pdf}
        VITE_PROJECT_MODE: ${PROJECT_MODE:-saas}
        CACHE_BUST: ${CACHE_BUST:-0}
    container_name: pdf-frontend
    restart: unless-stopped
    networks: [pdf-network]

  nginx:
    build: 
      context: ./nginx
    container_name: pdf-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      NGINX_FRONTEND_SERVER_NAME: ${NGINX_FRONTEND_SERVER_NAME:-app-qa.atlas-pdf.com}
      NGINX_API_SERVER_NAME: ${NGINX_API_SERVER_NAME:-api-qa.atlas-pdf.com}
      NGINX_FRONTEND_UPSTREAM: ${NGINX_FRONTEND_UPSTREAM:-pdf-frontend:80}
      NGINX_BACKEND_UPSTREAM: backend:${API_PORT:-4000}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-100M}
    depends_on: [backend, frontend]
    networks: [pdf-network]

volumes:
  mongodb_data:
  postgres_data:
  redis_data:
  uploads:

networks:
  pdf-network:
    driver: bridge

